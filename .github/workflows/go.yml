name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:

        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' 

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0    
        run: |
          go build -ldflags="-s -w" -o pipg .
          # rename binary to include OS and ARCH
          mv pipg pipg-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifacts (for manual runs or debugging)
        uses: actions/upload-artifact@v4
        with:
          name: pipg-${{ matrix.os }}-${{ matrix.arch }}
          path: pipg-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error

      - name: Store binary for checksum generation
        run: |
          mkdir -p dist
          cp pipg-${{ matrix.os }}-${{ matrix.arch }} dist/

      - name: Generate checksums
        if: matrix.os == 'linux' && matrix.arch == 'amd64'  
        run: |
          cd dist
          sha256sum pipg-* > checksums.txt
          cat checksums.txt

      - name: Upload all binaries and checksums to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/pipg-*
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
